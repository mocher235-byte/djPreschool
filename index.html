<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 暑期小一正音先修班 - 金名德晉文理補習班</title>
    <!-- Google Fonts: Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-custom {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }
        .animate-pulse-play { animation: pulse-custom 2s infinite; }
        
        /* 3D Button Style */
        .btn-3d {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.3), inset 0 -4px 0 rgba(0, 0, 0, 0.1);
        }
        .btn-3d:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(249, 115, 22, 0.4), inset 0 -4px 0 rgba(0, 0, 0, 0.1);
        }
        .btn-3d:active {
            transform: translateY(0px) scale(0.98);
        }

        .btn-line { box-shadow: 0 8px 15px -4px rgba(6, 199, 85, 0.3); }
        .btn-fb { box-shadow: 0 8px 15px -4px rgba(37, 99, 235, 0.3); }

        /* Custom underline */
        .custom-underline {
            background: linear-gradient(to top, #ffedd5 40%, transparent 40%);
            display: inline-block;
            padding: 0 4px;
        }

        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} {...props}></i>;
        };

        const Slideshow = ({ images }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const timerRef = useRef(null);

            const nextSlide = () => {
                setCurrentIndex((prev) => (prev + 1) % images.length);
            };

            const prevSlide = () => {
                setCurrentIndex((prev) => (prev - 1 + images.length) % images.length);
            };

            useEffect(() => {
                timerRef.current = setInterval(nextSlide, 4000);
                return () => clearInterval(timerRef.current);
            }, [currentIndex]);

            return (
                <div className="relative w-full max-w-4xl mx-auto overflow-hidden rounded-[2rem] shadow-2xl bg-gray-100 group">
                    <div className="relative aspect-[16/10] md:aspect-[16/9]">
                        {images.map((src, index) => (
                            <div
                                key={index}
                                className={`absolute inset-0 transition-opacity duration-700 ease-in-out ${index === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}
                            >
                                <img src={src} className="w-full h-full object-cover" alt={`Slide ${index}`} />
                            </div>
                        ))}
                    </div>
                    <button onClick={prevSlide} className="absolute left-4 top-1/2 -translate-y-1/2 z-20 bg-white/30 hover:bg-white/80 p-3 rounded-full backdrop-blur-sm transition-all opacity-0 group-hover:opacity-100">
                        <Icon name="chevron-left" className="w-6 h-6 text-gray-800" />
                    </button>
                    <button onClick={nextSlide} className="absolute right-4 top-1/2 -translate-y-1/2 z-20 bg-white/30 hover:bg-white/80 p-3 rounded-full backdrop-blur-sm transition-all opacity-0 group-hover:opacity-100">
                        <Icon name="chevron-right" className="w-6 h-6 text-gray-800" />
                    </button>
                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex space-x-2">
                        {images.map((_, index) => (
                            <button key={index} onClick={() => setCurrentIndex(index)} className={`w-3 h-3 rounded-full transition-all ${index === currentIndex ? 'bg-orange-500 scale-125' : 'bg-white/50'}`}></button>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [submitted, setSubmitted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [formData, setFormData] = useState({
                studentName: '', school: '', grade: '', phone: '', referrerCode: ''
            });

            const courseData = {
                schoolName: "金名德晉文理補習班",
                phone: "03-6572508",
                address: "新竹縣竹北市文孝街23號 (補教協會2樓)",
                lineUrl: "https://line.me/ti/p/wWDrQ__gJj",
                enrollLineUrl: "https://line.me/ti/p/wWDrQ__gJj",
                facebookUrl: "https://www.facebook.com/profile.php?id=100093037064982",
                navigationUrl: "https://share.google/U27mXQ44931dQ7egu",
                logo: "https://blogger.googleusercontent.com/img/a/AVvXsEjRqKCNWrsH37nthSraJgRc4iUslqv0Pw0urBa9ZwTuV3CLiliGNWjV3EddlJwJ7ox07Uol5GQL77Msjqw-_MUrwQIS6E7iHsdc-RaogP2TVjkJmZ1IkGSrX4ZCLfiZmapAPl5PyxovhZwtsxh080ROmCTJWQcbdtBMAAYIlO-BIsofB7tRYNn0ZZTHEgM",
                scheduleImage: "https://i.postimg.cc/CMcn5XYh/S-652648467.jpg",
                mainVideoUrl: "https://youtube.com/shorts/gsO9PVrtyVo",
                mainVideoCover: "https://i.postimg.cc/RZn7Fnbf/4yue22ri-(4)-fu-ben-feng-mian.jpg",
                photos: [
                    "https://i.postimg.cc/d17wPwV4/IMG-7698.jpg",
                    "https://i.postimg.cc/KYpxHRmX/IMG-7699.jpg",
                    "https://i.postimg.cc/Xv14zp4t/IMG-7717.jpg",
                    "https://i.postimg.cc/GtGRtKG0/IMG-8422.avif",
                    "https://i.postimg.cc/G3ydXLNM/IMG-9908.jpg"
                ],
                // 特別活動資訊
                infoSession: {
                    title: "小一新生姓名印章及 AI 實作體驗",
                    date: "2026/05/30 (六)",
                    time: "13:00 ～ 14:00",
                    productImage: "https://i.postimg.cc/8k7HNLFT/Chat-GPT-Image-2025nian5yue5ri-xia-wu10-39-54.png",
                    priceInfo: "原價 500 元 ⮕ 公益活動完全免費",
                    limitNote: "限額 5 名，欲報從速！",
                    get calendarLink() {
                        const title = encodeURIComponent(`金名德晉 ${this.title}`);
                        const details = encodeURIComponent(`歡迎參加小一新生特別活動！我們將進行姓名印章製作及 AI 實作體驗。\n\n💰 費用：課程原價 500 元，此次為公益活動完全免費！\n👥 名額：限額 5 名\n📍 地點：新竹縣竹北市文孝街23號 (補教協會2樓)\n🚗 導航連結：https://share.google/U27mXQ44931dQ7egu`);
                        const location = encodeURIComponent(`新竹縣竹北市文孝街23號 (補教協會2樓)`);
                        return `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=20260530T130000/20260530T140000&details=${details}&location=${location}`;
                    }
                }
            };

            const scrollToForm = () => {
                const element = document.getElementById('enroll-form');
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const response = await fetch("https://formspree.io/f/xeevggzb", {
                        method: "POST",
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    if (response.ok) {
                        const copyText = `【小一先修諮詢資料】\n學生姓名：${formData.studentName}\n學校：${formData.school}\n年級：${formData.grade}\n電話：${formData.phone}`;
                        copyToClipboard(copyText);
                        setSubmitted(true);
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen bg-white text-gray-900">
                    {/* Fixed LINE Floating Icon */}
                    <a href={courseData.lineUrl} target="_blank" className="fixed bottom-8 right-8 z-[100] animate-float">
                        <div className="bg-[#06C755] p-4 rounded-3xl shadow-2xl flex items-center justify-center hover:scale-110 transition-transform">
                            <Icon name="message-circle" className="w-8 h-8 text-white fill-current" />
                        </div>
                    </a>

                    {/* Nav */}
                    <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-orange-50">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <img src={courseData.logo} className="w-12 h-12" alt="Logo" />
                                <span className="text-xl font-black text-orange-600 tracking-tight">{courseData.schoolName}</span>
                            </div>
                            <button onClick={scrollToForm} className="hidden md:block bg-orange-500 text-white px-6 py-2.5 rounded-full font-bold hover:bg-orange-600 transition-colors shadow-lg">
                                立即預約諮詢
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="pt-16 pb-12 px-6 text-center bg-white">
                        <div className="max-w-4xl mx-auto">
                            <div className="inline-flex items-center bg-orange-50 text-orange-600 px-5 py-2 rounded-full font-bold mb-10 shadow-sm border border-orange-100">
                                <span className="mr-2">🎒</span> 讓孩子愛上ㄅㄆㄇ！開啟小一新生活
                            </div>
                            <h2 className="text-5xl md:text-7xl font-black text-gray-800 mb-8 tracking-tight leading-tight">
                                在「金名德晉」<br/>
                                <span className="text-orange-500 custom-underline mt-2">遇見最有耐心的老師</span>
                            </h2>
                            <p className="text-xl md:text-2xl text-gray-500 font-medium leading-relaxed max-w-3xl mx-auto mb-10">
                                還在擔心孩子聲調分不清？二聲三聲傻傻分不清楚？<br className="hidden md:block" />
                                我們不只教拼音，更教「興趣」！銜接小一，從正音開始建立自信心。
                            </p>
                        </div>
                    </header>

                    {/* Social Interaction Section */}
                    <section className="pb-12 px-6">
                        <div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-8">
                            <div className="bg-white p-8 rounded-[2.5rem] border-2 border-blue-50 shadow-sm hover:shadow-md transition-all">
                                <div className="mb-6">
                                    <h3 className="text-2xl font-black text-gray-800 flex items-center">
                                        <Icon name="facebook" className="w-6 h-6 text-blue-600 mr-2 fill-current" />
                                        FB 按讚追蹤
                                    </h3>
                                    <p className="text-gray-500 font-bold mt-2">掌握最新教育資訊與活動好康</p>
                                </div>
                                <a href={courseData.facebookUrl} target="_blank" className="w-full btn-fb bg-blue-600 text-white py-5 rounded-2xl font-black text-lg flex items-center justify-center hover:scale-[1.02] transition-transform">
                                    <Icon name="facebook" className="mr-3 fill-current" />
                                    點我前往 FB 按讚分享
                                </a>
                            </div>

                            <div className="bg-white p-8 rounded-[2.5rem] border-2 border-green-50 shadow-sm hover:shadow-md transition-all">
                                <div className="mb-6">
                                    <h3 className="text-2xl font-black text-gray-800 flex items-center">
                                        <Icon name="message-circle" className="w-6 h-6 text-[#06C755] mr-2 fill-current" />
                                        LINE 官方諮詢
                                    </h3>
                                    <p className="text-gray-500 font-bold mt-2">一對一專業諮詢，解答課程疑問</p>
                                </div>
                                <a href={courseData.lineUrl} target="_blank" className="w-full btn-line bg-[#06C755] text-white py-5 rounded-2xl font-black text-lg flex items-center justify-center hover:scale-[1.02] transition-transform">
                                    <Icon name="message-circle" className="mr-3 fill-current" />
                                    點我前往 LINE 立即諮詢
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Enrollment Form */}
                    <section id="enroll-form" className="py-16 bg-white scroll-mt-24">
                        <div className="max-w-4xl mx-auto px-6">
                            <div className="bg-white rounded-[3rem] p-10 md:p-16 shadow-2xl border-2 border-orange-100">
                                {submitted ? (
                                    <div className="text-center space-y-8 animate-fade-in-up py-10">
                                        <div className="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto shadow-inner"><Icon name="check" className="text-green-600 w-12 h-12" /></div>
                                        <div>
                                            <h4 className="text-4xl font-black text-gray-900 mb-4 tracking-tight">提交成功！即將為您加 LINE</h4>
                                            <p className="text-gray-600 text-xl font-medium leading-relaxed italic">
                                                您的諮詢資料已自動複製。<br/>
                                                請點擊下方按鈕加入 LINE 並「貼上」發送資料。
                                            </p>
                                        </div>
                                        <div className="space-y-4">
                                            <a href={courseData.enrollLineUrl} target="_blank" className="w-full flex items-center justify-center bg-[#06C755] text-white py-6 rounded-3xl text-2xl font-black shadow-xl hover:scale-[1.02] transition-transform">
                                                <Icon name="message-circle" className="w-8 h-8 mr-3 fill-current" />
                                                點我加 LINE 並貼上資料
                                            </a>
                                            <p className="text-gray-400 font-bold text-sm">※ 點擊後會自動導向 LINE 官方帳號</p>
                                        </div>
                                    </div>
                                ) : (
                                    <form onSubmit={handleSubmit} className="space-y-8">
                                        <div className="text-center mb-10">
                                            <h3 className="text-4xl font-black text-gray-800 mb-2 italic tracking-tight">預約諮詢</h3>
                                            <p className="text-lg text-gray-500 font-bold">提交資料後會自動加 LINE 好友由老師為您服務</p>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div className="space-y-2">
                                                <label className="block font-black text-gray-700 ml-1 text-lg">學生姓名</label>
                                                <input required type="text" placeholder="輸入真實姓名" className="w-full bg-orange-50/50 border-2 border-transparent focus:border-orange-400 focus:bg-white rounded-2xl px-6 py-4 outline-none transition-all shadow-inner text-lg font-medium" value={formData.studentName} onChange={e => setFormData({...formData, studentName: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="block font-black text-gray-700 ml-1 text-lg">就讀學校</label>
                                                <input required type="text" placeholder="例如：中正國小" className="w-full bg-orange-50/50 border-2 border-transparent focus:border-orange-400 focus:bg-white rounded-2xl px-6 py-4 outline-none transition-all shadow-inner text-lg font-medium" value={formData.school} onChange={e => setFormData({...formData, school: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div className="space-y-2">
                                                <label className="block font-black text-gray-700 ml-1 text-lg">年級</label>
                                                <select required className="w-full bg-orange-50/50 border-2 border-transparent focus:border-orange-400 focus:bg-white rounded-2xl px-6 py-4 outline-none transition-all shadow-inner text-lg font-medium cursor-pointer" value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})}>
                                                    <option value="" disabled>請選擇年級</option>
                                                    <option value="大班升小一">大班升小一</option>
                                                    <option value="其他">其他</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="block font-black text-gray-700 ml-1 text-lg">家長聯絡電話</label>
                                                <input required type="tel" placeholder="09XX-XXX-XXX" className="w-full bg-orange-50/50 border-2 border-transparent focus:border-orange-400 focus:bg-white rounded-2xl px-6 py-4 outline-none transition-all shadow-inner text-lg font-medium" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                            </div>
                                        </div>
                                        <button type="submit" disabled={isSubmitting} className="w-full btn-3d bg-orange-500 text-white font-black text-2xl py-6 rounded-3xl shadow-xl mt-4">
                                            {isSubmitting ? '處理中...' : '提交諮詢資料'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* Video Section */}
                    <section className="py-16 bg-orange-50/30">
                        <div className="max-w-6xl mx-auto px-6">
                            <div className="bg-white/80 backdrop-blur-sm rounded-[3rem] p-8 md:p-16 shadow-2xl border border-orange-100 flex flex-col lg:flex-row items-stretch gap-12">
                                <div className="w-full lg:w-[420px] flex-shrink-0">
                                    <a href={courseData.mainVideoUrl} target="_blank" className="aspect-[9/16] bg-gray-900 rounded-[2.5rem] overflow-hidden shadow-2xl border-8 border-white relative group block cursor-pointer">
                                        <img src={courseData.mainVideoCover} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="教學影片" />
                                        <div className="absolute inset-0 bg-black/5 group-hover:bg-black/30 transition-colors flex flex-col items-center justify-center">
                                            <div className="bg-orange-500 text-white p-7 rounded-full shadow-2xl transform transition-all group-hover:scale-110 animate-pulse-play">
                                                <Icon name="play" className="w-14 h-14 fill-current ml-1" />
                                            </div>
                                            <div className="mt-8 bg-white/95 text-orange-600 px-8 py-3 rounded-full font-black text-xl shadow-lg transform translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all">點擊觀看精彩實錄</div>
                                        </div>
                                    </a>
                                </div>

                                <div className="flex-1 flex flex-col justify-between">
                                    <div className="space-y-8">
                                        <div className="inline-flex items-center text-orange-600 font-black text-3xl italic tracking-tight">
                                            <Icon name="sparkles" className="w-8 h-8 mr-2 text-orange-400" />
                                            亮點直擊：
                                        </div>
                                        <div className="space-y-6">
                                            <div className="flex items-start">
                                                <div className="bg-orange-100 p-2.5 rounded-xl mr-4 mt-1"><Icon name="mic" className="w-5 h-5 text-orange-600" /></div>
                                                <div>
                                                    <h4 className="text-xl font-black text-gray-800">互動引導</h4>
                                                    <p className="text-gray-600 font-medium leading-relaxed mt-1">擺脫傳統死背，讓孩子大聲讀、快樂學。</p>
                                                </div>
                                            </div>
                                            <div className="flex items-start">
                                                <div className="bg-orange-100 p-2.5 rounded-xl mr-4 mt-1"><Icon name="smile" className="w-5 h-5 text-orange-600" /></div>
                                                <div>
                                                    <h4 className="text-xl font-black text-gray-800">手勢記憶</h4>
                                                    <p className="text-gray-600 font-medium leading-relaxed mt-1">結合肢體動作，聲調變化一看就懂、一學就會。</p>
                                                </div>
                                            </div>
                                            <div className="flex items-start">
                                                <div className="bg-orange-100 p-2.5 rounded-xl mr-4 mt-1"><Icon name="award" className="w-5 h-5 text-orange-600" /></div>
                                                <div>
                                                    <h4 className="text-xl font-black text-gray-800">專業師資</h4>
                                                    <p className="text-gray-600 font-medium leading-relaxed mt-1">熱情十足的引導，讓孩子在笑聲中掌握正確發音。</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="py-6 border-t border-dashed border-orange-200">
                                            <p className="text-2xl font-black text-orange-500 mb-2 leading-tight">銜接小一，從「正音」開始建立自信心！</p>
                                            <p className="text-lg font-bold text-gray-500 italic">歡迎預約試聽，感受最有活力的課堂魅力！</p>
                                        </div>
                                    </div>
                                    <div className="mt-8 space-y-6">
                                        <div className="bg-orange-50/50 p-6 rounded-3xl border border-orange-100 space-y-3">
                                            <div className="flex items-center text-gray-700 font-bold">
                                                <Icon name="map-pin" className="w-5 h-5 mr-3 text-orange-400" />
                                                校址：{courseData.address}
                                            </div>
                                            <div className="flex items-center text-gray-700 font-bold">
                                                <Icon name="phone-call" className="w-5 h-5 mr-3 text-orange-400" />
                                                電話：{courseData.phone}
                                            </div>
                                        </div>
                                        <button onClick={scrollToForm} className="w-full btn-3d bg-orange-500 text-white py-6 rounded-3xl font-black text-2xl shadow-xl">
                                            立即預約諮詢
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Course Schedule Section */}
                    <section className="py-20 bg-white">
                        <div className="max-w-4xl mx-auto px-6 text-center">
                            <div className="inline-flex items-center justify-center bg-orange-100 text-orange-600 px-6 py-2 rounded-full mb-6">
                                <Icon name="calendar" className="w-5 h-5 mr-2" />
                                <span className="font-bold tracking-wider">課程時間表</span>
                            </div>
                            <h3 className="text-4xl font-black text-gray-800 mb-12 tracking-tight">小一先修班詳細課表</h3>
                            <div className="bg-orange-50/50 p-4 md:p-8 rounded-[3rem] shadow-inner border border-orange-100 overflow-hidden">
                                <img src={courseData.scheduleImage} alt="課程課表" className="w-full h-auto rounded-3xl shadow-xl border-4 border-white transform transition-transform hover:scale-[1.01]" />
                            </div>
                        </div>
                    </section>

                    {/* Photo Collection */}
                    <section className="py-24 bg-orange-50/20">
                        <div className="max-w-6xl mx-auto px-6">
                            <div className="text-center mb-16">
                                <h3 className="text-4xl font-black text-gray-800 mb-4 tracking-tight">📸 學習成長點滴</h3>
                                <p className="text-xl text-gray-500 font-medium italic">記錄孩子在金名德晉的每一個快樂瞬間</p>
                            </div>
                            <Slideshow images={courseData.photos} />
                        </div>
                    </section>

                    {/* 特別活動區塊 - 已移至最下方並強化強調 */}
                    <section className="py-20 bg-white">
                        <div className="max-w-6xl mx-auto px-6">
                            <div className="bg-orange-500 text-white rounded-[3rem] p-8 md:p-12 shadow-[0_35px_60px_-15px_rgba(249,115,22,0.3)] relative overflow-hidden">
                                {/* 背景裝飾 */}
                                <div className="absolute top-0 right-0 p-4 opacity-10 transform translate-x-8 -translate-y-8">
                                    <Icon name="megaphone" className="w-64 h-64 rotate-12" />
                                </div>

                                <div className="relative z-10 flex flex-col lg:flex-row items-center gap-12">
                                    {/* 文字內容區 */}
                                    <div className="flex-1 space-y-8 text-center lg:text-left">
                                        <div className="flex flex-col md:flex-row items-center gap-4 justify-center lg:justify-start">
                                            <div className="bg-white/20 px-5 py-2 rounded-full text-sm font-black backdrop-blur-md border border-white/30 uppercase tracking-widest">
                                                📢 限額公益場次
                                            </div>
                                            <div className="bg-yellow-400 text-orange-600 px-5 py-2 rounded-full text-sm font-black shadow-lg animate-pulse">
                                                ⚡ 僅限 5 名額
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <h3 className="text-4xl md:text-6xl font-black tracking-tighter leading-tight">
                                                小一新生<br/>
                                                <span className="text-orange-100">姓名印章及 AI 實作體驗</span>
                                            </h3>
                                        </div>

                                        <div className="grid md:grid-cols-2 gap-4 text-xl font-bold">
                                            <div className="flex items-center justify-center lg:justify-start bg-white/10 p-4 rounded-2xl border border-white/10">
                                                <Icon name="calendar" className="w-7 h-7 mr-3 text-orange-200" /> {courseData.infoSession.date}
                                            </div>
                                            <div className="flex items-center justify-center lg:justify-start bg-white/10 p-4 rounded-2xl border border-white/10">
                                                <Icon name="clock" className="w-7 h-7 mr-3 text-orange-200" /> {courseData.infoSession.time}
                                            </div>
                                        </div>

                                        {/* 強調免費區塊 */}
                                        <div className="relative group">
                                            <div className="absolute -inset-1 bg-gradient-to-r from-yellow-400 to-orange-400 rounded-3xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                                            <div className="relative bg-white/95 p-8 rounded-3xl border-2 border-yellow-400 flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
                                                <div className="flex items-center">
                                                    <div className="bg-orange-500 text-white w-16 h-16 rounded-2xl flex items-center justify-center text-3xl font-black shadow-inner mr-5">
                                                        $0
                                                    </div>
                                                    <div>
                                                        <p className="text-gray-400 font-bold line-through text-lg">原價 500 元課程</p>
                                                        <p className="text-orange-600 text-3xl font-black tracking-tighter italic">公益活動完全免費！</p>
                                                    </div>
                                                </div>
                                                <a href={courseData.infoSession.calendarLink} target="_blank" className="bg-orange-500 hover:bg-orange-600 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-lg hover:scale-105 transition-all flex items-center justify-center whitespace-nowrap">
                                                    <Icon name="calendar-plus" className="w-6 h-6 mr-3" />
                                                    加入行事曆預約
                                                </a>
                                            </div>
                                        </div>
                                        
                                        <p className="text-orange-100 font-bold text-center lg:text-left text-lg italic">
                                            📍 地點：{courseData.address}
                                        </p>
                                    </div>

                                    {/* 作品圖片區 */}
                                    <div className="w-full lg:w-[320px] flex-shrink-0">
                                        <div className="relative group">
                                            <div className="absolute inset-0 bg-white/20 rounded-full blur-3xl animate-pulse"></div>
                                            <div className="relative bg-white p-4 rounded-[3.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] transform rotate-3 transition-transform group-hover:rotate-0 duration-500 border-8 border-orange-400/20">
                                                <img src={courseData.infoSession.productImage} className="w-full h-auto rounded-[2.5rem] object-cover aspect-square" alt="作品展示" />
                                                <div className="absolute -bottom-4 -right-4 bg-yellow-400 text-orange-600 px-6 py-3 rounded-2xl font-black shadow-xl transform -rotate-12">
                                                    作品示意圖
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-gray-950 text-white pt-24 pb-12">
                        <div className="max-w-6xl mx-auto px-6">
                            <div className="grid md:grid-cols-2 gap-16 mb-20">
                                <div className="space-y-8 text-center md:text-left">
                                    <h3 className="text-3xl font-black text-orange-500 tracking-wider">聯絡資訊</h3>
                                    <div className="space-y-5 text-gray-400 text-xl font-medium">
                                        <p className="flex items-center justify-center md:justify-start"><Icon name="phone" className="mr-4 w-6 h-6 text-orange-500" /> {courseData.phone}</p>
                                        <p className="flex items-start justify-center md:justify-start text-left"><Icon name="map-pin" className="mr-4 w-6 h-6 text-orange-500 mt-1" /> {courseData.address}</p>
                                    </div>
                                    <a href={courseData.navigationUrl} target="_blank" className="inline-flex items-center bg-white/5 hover:bg-white/10 px-6 py-3 rounded-2xl transition-all border border-white/10">
                                        <Icon name="navigation" className="mr-3 w-5 h-5 text-blue-400" /> Google 地圖導航
                                    </a>
                                </div>
                            </div>
                            <div className="text-center pt-10 border-t border-gray-900 text-gray-600 text-sm font-bold tracking-tight">
                                © 2026 {courseData.schoolName} 版權所有 | 陪伴孩子自信踏入小學的第一步
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

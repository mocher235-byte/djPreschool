<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 暑期小一正音先修班 - 金名德晉文理補習班</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-bounce-short { animation: bounce-short 0.5s ease-in-out; }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
        .animation-delay-500 { animation-delay: 0.5s; }
        .animation-delay-2000 { animation-delay: 2s; }
        
        /* 3D Button Style */
        .btn-3d {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2), inset 0 -4px 0 rgba(0, 0, 0, 0.1);
        }
        .btn-3d:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), inset 0 -4px 0 rgba(0, 0, 0, 0.1);
        }
        .btn-3d:active {
            transform: translateY(0px) scale(0.98);
            box-shadow: 0 5px 10px -2px rgba(0, 0, 0, 0.2), inset 0 0 0 rgba(0, 0, 0, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Optimized Icon component
        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            useEffect(() => {
                const initIcons = () => {
                    if (window.lucide) {
                        window.lucide.createIcons();
                    }
                };
                initIcons();
                const timer = setTimeout(initIcons, 150);
                return () => clearTimeout(timer);
            }, [name]);
            return <i data-lucide={name} className={className} {...props}></i>;
        };

        const App = () => {
            const [submitted, setSubmitted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [error, setError] = useState(null);

            const [formData, setFormData] = useState({
                studentName: '',
                school: '',
                grade: '',
                phone: ''
            });

            const courseData = {
                title: "2026 暑期小一正音先修班",
                schoolName: "金名德晉文理補習班",
                phone: "03-6572508",
                address: "新竹縣竹北市文孝街23號(補教協會2樓)",
                lineUrl: "https://line.me/ti/p/vQcf6cONnl",
                facebookUrl: "https://www.facebook.com/profile.php?id=100093037064982",
                navigationUrl: "https://share.google/U27mXQ44931dQ7egu",
                branchInfoUrl: "https://share.google/VB2ZaBY0otRavFQxT",
                scheduleImage: "https://i.postimg.cc/rpDGRGsP/ying-mu-xie-qu-hua-mian-2026-04-18-000725.png",
                logo: "https://blogger.googleusercontent.com/img/a/AVvXsEjRqKCNWrsH37nthSraJgRc4iUslqv0Pw0urBa9ZwTuV3CLiliGNWjV3EddlJwJ7ox07Uol5GQL77Msjqw-_MUrwQIS6E7iHsdc-RaogP2TVjkJmZ1IkGSrX4ZCLfiZmapAPl5PyxovhZwtsxh080ROmCTJWQcbdtBMAAYIlO-BIsofB7tRYNn0ZZTHEgM",
                batches: [
                    { id: 1, name: "第一梯次", date: "7/01 ~ 7/31", status: "熱烈報名中" },
                    { id: 2, name: "第二梯次", date: "8/01 ~ 8/30", status: "名額有限" }
                ],
                target: "升小一學生 (滿 5 人開班/梯次)",
                description: "在「金名德晉」遇見最有耐心的老師，陪伴孩子跨越拼音關卡。誰說學正音很枯燥？看孩子們如何快樂學習，自信發音！"
            };

            const scrollToForm = () => {
                const element = document.getElementById('enroll-form');
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                setError(null);
                
                try {
                    const response = await fetch("https://formspree.io/f/xeevggzb", {
                        method: "POST",
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });

                    if (response.ok) {
                        setSubmitted(true);
                        setFormData({ studentName: '', school: '', grade: '', phone: '' });
                        setTimeout(() => {
                            const successEl = document.getElementById('success-message');
                            if (successEl) successEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 100);
                    } else {
                        const data = await response.json();
                        setError(data.error || "提交失敗，請檢查網路後再試。");
                    }
                } catch (err) {
                    setError("連線異常，請確認您的網路狀況。");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen bg-orange-50 font-sans text-gray-800 pb-20 md:pb-0">
                    {/* Professional 3D Floating Social Icons */}
                    <div className="fixed bottom-6 right-6 z-[100] flex flex-col space-y-5">
                        <a 
                            href={courseData.facebookUrl} 
                            target="_blank" 
                            className="btn-3d w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center animate-float"
                            title="前往臉書"
                        >
                            <Icon name="facebook" className="w-8 h-8 text-white fill-current" />
                        </a>
                        <a 
                            href={courseData.lineUrl} 
                            target="_blank" 
                            className="btn-3d w-14 h-14 bg-[#06C755] rounded-2xl flex items-center justify-center animate-float animation-delay-500"
                            title="LINE 諮詢"
                        >
                            <Icon name="message-circle" className="w-8 h-8 text-white fill-current" />
                        </a>
                    </div>

                    {/* Header */}
                    <nav className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <img src={courseData.logo} alt="Logo" className="w-12 h-12 rounded-full border-2 border-yellow-400 object-contain" />
                                <h1 className="text-xl font-bold text-orange-600 leading-tight">{courseData.schoolName}</h1>
                            </div>
                            <button onClick={scrollToForm} className="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-full font-bold text-sm transition-all flex items-center shadow-lg">
                                立即諮詢 <Icon name="chevron-right" className="w-4 h-4 ml-1" />
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative bg-white pt-12 pb-20 overflow-hidden text-center md:text-left">
                        <div className="max-w-6xl mx-auto px-4 flex flex-col md:flex-row items-center">
                            <div className="md:w-1/2 z-10 mb-10 md:mb-0">
                                <span className="inline-block bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-sm font-bold mb-4 shadow-sm">
                                    ✨ 2026 暑期限定招生 ✨
                                </span>
                                <h2 className="text-4xl md:text-6xl font-black text-gray-900 mb-6 leading-tight">
                                    讓孩子愛上拼音<br/>
                                    <span className="text-orange-500">自信迎接小一新生活</span>
                                </h2>
                                <p className="text-lg text-gray-600 mb-8 max-w-lg mx-auto md:mx-0 leading-relaxed font-medium">
                                    {courseData.description}
                                </p>
                                <div className="flex justify-center md:justify-start">
                                    <button onClick={scrollToForm} className="btn-3d bg-orange-500 text-white px-10 py-5 rounded-2xl font-black text-2xl flex items-center shadow-lg">
                                        立即諮詢報名 <Icon name="chevron-right" className="w-8 h-8 ml-2" />
                                    </button>
                                </div>
                            </div>
                            <div className="md:w-1/2 relative group">
                                <div className="absolute -inset-4 bg-orange-400 rounded-3xl opacity-20 blur-xl animate-pulse"></div>
                                <img src="https://blogger.googleusercontent.com/img/a/AVvXsEiEqc3q2yxDhy0X5kurf01MYdBjJfa7e0qEbzPfGl8Re7Sk8SqIT3QXOLxVu6g7Ei4TaW6b5f14zNJtx9Yq-0UwVcxIBSiHyLEQCJ64pE-t9H-sStG5mRFCCz_Hpx2jeNx9A_cJKxcB_u-Nh86QVSe6rqort8mkXmMwtOo-4Qa8A6A_Lxjrbq2sAy92dzM" alt="Classroom" className="relative rounded-3xl shadow-2xl w-full object-cover transform transition-transform duration-500 group-hover:scale-[1.02]" />
                            </div>
                        </div>
                    </header>

                    {/* Course Batches */}
                    <section className="py-20 bg-orange-50">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <h3 className="text-3xl font-bold mb-4 text-gray-900 italic">【 課程日期與梯次 】</h3>
                            <div className="grid md:grid-cols-2 gap-8">
                                {courseData.batches.map(batch => (
                                    <div key={batch.id} className="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-orange-500 transform hover:-translate-y-2 transition-all">
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="bg-orange-100 text-orange-600 font-bold px-3 py-1 rounded-lg">{batch.name}</span>
                                            <span className="text-green-500 text-sm font-medium flex items-center">
                                                <div className="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></div>
                                                {batch.status}
                                            </span>
                                        </div>
                                        <div className="text-4xl font-black text-gray-800 mb-2 tracking-tight">{batch.date}</div>
                                        <p className="text-gray-500 font-medium">包含正音拼音、聲調練習、趣味識字</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Enrollment Form Section */}
                    <section id="enroll-form" className="py-24 bg-white scroll-mt-20">
                        <div className="max-w-4xl mx-auto px-4">
                            <div className="bg-orange-50 rounded-[3rem] p-8 md:p-16 shadow-2xl border-2 border-orange-100 relative overflow-hidden min-h-[500px] flex items-center justify-center">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-orange-200/30 rounded-full -translate-y-16 translate-x-16"></div>
                                
                                <div className="w-full">
                                    {submitted ? (
                                        <div id="success-message" className="bg-white rounded-3xl p-12 text-center border-2 border-green-200 shadow-xl animate-fade-in-up">
                                            <div className="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 animate-float">
                                                <Icon name="check" className="text-green-600 w-12 h-12" />
                                            </div>
                                            <h4 className="text-3xl font-black text-gray-900 mb-4 italic">提交成功！</h4>
                                            <p className="text-xl text-gray-600 font-bold mb-8">
                                                謝謝您的預約，<br/>
                                                補習班老師將盡快與您聯絡。✨
                                            </p>
                                            <button 
                                                onClick={() => setSubmitted(false)}
                                                className="bg-orange-500 hover:bg-orange-600 text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-lg"
                                            >
                                                返回表單
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="text-center mb-12">
                                                <h3 className="text-4xl font-black text-gray-900 mb-4 italic">預約報名 / 諮詢</h3>
                                                <p className="text-gray-600 font-bold text-lg">填寫資訊，我們將有專人與您聯繫</p>
                                            </div>

                                            <form onSubmit={handleSubmit} className="space-y-8">
                                                <div className="grid md:grid-cols-2 gap-8">
                                                    <div className="space-y-3">
                                                        <label className="block text-xl font-black text-gray-800">學生姓名</label>
                                                        <input name="studentName" type="text" required placeholder="請輸入姓名" value={formData.studentName} onChange={(e) => setFormData({...formData, studentName: e.target.value})} className="w-full bg-white border-2 border-orange-100 rounded-2xl px-6 py-4 text-lg focus:border-orange-500 outline-none transition-all shadow-sm" />
                                                    </div>
                                                    <div className="space-y-3">
                                                        <label className="block text-xl font-black text-gray-800">就讀學校</label>
                                                        <input name="school" type="text" required placeholder="例如：竹北國小" value={formData.school} onChange={(e) => setFormData({...formData, school: e.target.value})} className="w-full bg-white border-2 border-orange-100 rounded-2xl px-6 py-4 text-lg focus:border-orange-500 outline-none transition-all shadow-sm" />
                                                    </div>
                                                </div>

                                                <div className="grid md:grid-cols-2 gap-8">
                                                    <div className="space-y-3">
                                                        <label className="block text-xl font-black text-gray-800">年級</label>
                                                        <div className="relative">
                                                            <select name="grade" required value={formData.grade} onChange={(e) => setFormData({...formData, grade: e.target.value})} className="w-full bg-white border-2 border-orange-100 rounded-2xl px-6 py-4 text-lg focus:border-orange-500 outline-none transition-all appearance-none cursor-pointer shadow-sm font-medium">
                                                                <option value="" disabled>請點選年級</option>
                                                                <option value="小班">小班</option>
                                                                <option value="中班">中班</option>
                                                                <option value="大班">大班</option>
                                                                <option value="大班升小一">大班升小一</option>
                                                                <option value="其他">其他</option>
                                                            </select>
                                                            <div className="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-orange-400">
                                                                <Icon name="chevron-down" className="w-6 h-6" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="space-y-3">
                                                        <label className="block text-xl font-black text-gray-800">家長聯絡電話</label>
                                                        <input name="phone" type="tel" required placeholder="09XX-XXX-XXX" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} className="w-full bg-white border-2 border-orange-100 rounded-2xl px-6 py-4 text-lg focus:border-orange-500 outline-none transition-all shadow-sm" />
                                                    </div>
                                                </div>

                                                <button type="submit" disabled={isSubmitting} className="w-full bg-orange-500 hover:bg-orange-600 text-white font-black text-2xl py-6 rounded-3xl shadow-xl transition-all hover:scale-[1.01] active:scale-95 flex items-center justify-center group disabled:opacity-70">
                                                    {isSubmitting ? '正在傳送報名資料...' : '立即提交報名'} 
                                                    {!isSubmitting && <Icon name="chevron-right" className="ml-2 w-8 h-8 group-hover:translate-x-1 transition-transform" />}
                                                </button>
                                            </form>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-orange-500 text-white pt-20 pb-10">
                        <div className="max-w-6xl mx-auto px-4">
                            <div className="bg-white text-gray-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl mb-16 flex flex-col md:flex-row items-center justify-between">
                                <div className="mb-10 md:mb-0 md:w-2/3 text-center md:text-left">
                                    <h3 className="text-3xl font-black mb-4">聯絡資訊</h3>
                                    <div className="space-y-4 font-bold flex flex-col items-center md:items-start text-lg">
                                        <div className="flex items-center"><Icon name="phone" className="w-6 h-6 mr-3 text-orange-500" /> {courseData.phone}</div>
                                        <div className="flex items-start text-left leading-tight"><Icon name="map-pin" className="w-6 h-6 mr-3 text-orange-500 mt-1" /> {courseData.address}</div>
                                    </div>
                                    <a href={courseData.navigationUrl} target="_blank" className="mt-8 inline-flex items-center bg-blue-50 text-blue-600 px-6 py-3 rounded-2xl font-bold hover:bg-blue-100 transition-colors">
                                        <Icon name="navigation" className="w-5 h-5 mr-2" /> Google 地圖導航
                                    </a>
                                </div>
                                <div className="w-full md:w-auto flex flex-col space-y-5 items-center">
                                    <a href={courseData.lineUrl} target="_blank" className="w-full max-w-xs bg-[#06C755] text-white px-10 py-5 rounded-2xl font-black text-xl flex items-center justify-center shadow-lg transition-transform hover:scale-105 active:scale-95">
                                        <Icon name="message-circle" className="w-7 h-7 mr-3 text-white fill-current" /> LINE 諮詢
                                    </a>
                                    <a href={courseData.facebookUrl} target="_blank" className="w-full max-w-xs bg-blue-600 text-white px-10 py-5 rounded-2xl font-black text-xl flex items-center justify-center shadow-lg transition-transform hover:scale-105 active:scale-95 text-center">
                                        <Icon name="facebook" className="w-7 h-7 mr-3 text-white fill-current" /> 
                                        <span className="flex-1 text-center">金名德晉臉書</span>
                                    </a>
                                </div>
                            </div>
                            <div className="text-center border-t border-orange-400 pt-8">
                                <p className="text-orange-200 text-sm font-medium">© 2026 {courseData.schoolName} 版權所有 | 陪伴孩子自信踏入小學的第一步</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
